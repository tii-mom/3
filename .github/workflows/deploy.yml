name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_digest:
        description: Preflight-approved immutable GHCR digest (sha256:...)
        required: true
        type: string
      confirmation:
        description: Type DEPLOY_PREFLIGHTED_DIGEST
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: lowercase
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/$REPO" >> $GITHUB_OUTPUT

      - name: Resolve image metadata
        id: image_meta
        run: |
          BASE_VERSION=$(backend/scripts/resolve-version.sh)
          printf '%s\n' "$BASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$'
          SHORT_SHA=$(printf '%s' "$GITHUB_SHA" | cut -c1-12)
          echo "version=${BASE_VERSION}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.lowercase.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOPROXY=https://goproxy.io,direct
            VERSION=${{ steps.image_meta.outputs.version }}
            COMMIT=${{ steps.image_meta.outputs.commit }}
            DATE=${{ steps.image_meta.outputs.date }}

  deploy-to-vps:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout release source
        uses: actions/checkout@v6

      - name: Validate preflight-approved digest and confirmation
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$CONFIRMATION" = 'DEPLOY_PREFLIGHTED_DIGEST'
          printf '%s\n' "$IMAGE_DIGEST" | grep -Eq '^sha256:[0-9a-f]{64}$'

      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_HOST_KEY: ${{ secrets.VPS_SSH_HOST_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Deploy immutable image to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_DIGEST: ${{ inputs.image_digest }}
        run: |
          ssh -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            "bash -s -- '$IMAGE_DIGEST'" \
            < deploy/production-deploy.sh
