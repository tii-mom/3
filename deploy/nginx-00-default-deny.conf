# Default servers: drop unknown Host / direct-IP probes.
# Install: copy to /etc/nginx/conf.d/00-default-deny.conf
# Requires the same Origin cert used by api.3api.shop for the TLS default_server.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate /etc/nginx/ssl/sub2api.crt;
    ssl_certificate_key /etc/nginx/ssl/sub2api.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 444;
}
