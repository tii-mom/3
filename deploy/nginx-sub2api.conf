# Sub2API reverse proxy for api.3api.shop
# Install: /etc/nginx/conf.d/sub2api.conf
# Also install: cloudflare-realip.conf + nginx-00-default-deny.conf
#
# App binds 127.0.0.1:8085 (see deploy/.env BIND_HOST + SERVER_PORT).

server {
    listen 80;
    listen [::]:80;
    server_name api.3api.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.3api.shop;

    # REQUIRED for Codex sticky sessions (session_id header)
    underscores_in_headers on;

    # Codex /responses bodies (long context, tools, images) easily exceed nginx
    # default 1m → 413 Request Entity Too Large. Align with Sub2API gateway
    # max (GATEWAY_MAX_BODY_SIZE / server.max_request_body_size ≈ 256MB).
    client_max_body_size 256m;
    # Keep larger bodies in memory when possible (reduces temp-file buffering).
    client_body_buffer_size 16m;

    ssl_certificate /etc/nginx/ssl/sub2api.crt;
    ssl_certificate_key /etc/nginx/ssl/sub2api.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Compatibility for frontend bundles that hit /auth/* on API host
    location ^~ /auth/ {
        rewrite ^/auth/(.*)$ /api/v1/auth/$1 break;
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
