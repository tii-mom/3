server {
    listen 80;
    server_name api.3api.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.3api.shop;

    # Allow underscores in headers (REQUIRED for Codex CLI sticky sessions)
    underscores_in_headers on;

    # SSL Certificates (Self-signed, accepted by Cloudflare in "Full" SSL mode)
    ssl_certificate /etc/nginx/ssl/sub2api.crt;
    ssl_certificate_key /etc/nginx/ssl/sub2api.key;

    # Secure SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for Server-Sent Events (SSE / Streaming responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
